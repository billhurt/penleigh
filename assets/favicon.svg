<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Rounded square background in brand navy -->
  <rect width="64" height="64" rx="12" fill="#11264a"/>
  <!-- Three offset C-strokes evoking the wireframe but legible at 16px -->
  <g fill="none" stroke="#f4f1ea" stroke-linecap="round">
    <!-- Back stroke -->
    <path d="M 44 16 A 18 18 0 1 0 44 48" stroke-width="2.2" opacity="0.5"/>
    <!-- Mid stroke -->
    <path d="M 46 18 A 16 16 0 1 0 46 46" stroke-width="2.6" opacity="0.78"/>
    <!-- Front stroke -->
    <path d="M 48 20 A 14 14 0 1 0 48 44" stroke-width="3"/>
  </g>
</svg>
